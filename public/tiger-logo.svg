<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ff7eb3"/>
      <stop offset="30%" stopColor="#ff758c"/>
      <stop offset="60%" stopColor="#a8c8ff"/>
      <stop offset="100%" stopColor="#6df"/>
    </linearGradient>
    <linearGradient id="tg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#f7971e"/>
      <stop offset="50%" stopColor="#ffd200"/>
      <stop offset="100%" stopColor="#a8c8ff"/>
    </linearGradient>
    <linearGradient id="tg3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#dabafa"/>
      <stop offset="50%" stopColor="#ff7eb3"/>
      <stop offset="100%" stopColor="#ffd200"/>
    </linearGradient>
  </defs>
  <!-- ears -->
  <polygon points="20,18 32,30 28,10" fill="url(#tg)" opacity="0.85"/>
  <polygon points="80,18 68,30 72,10" fill="url(#tg)" opacity="0.85"/>
  <!-- inner ears -->
  <polygon points="24,18 30,27 28,14" fill="#ff7eb3" opacity="0.4"/>
  <polygon points="76,18 70,27 72,14" fill="#ff7eb3" opacity="0.4"/>
  <!-- face outline (angular/tribal) -->
  <polygon points="50,8 75,20 78,40 82,52 75,68 68,80 50,90 32,80 25,68 18,52 22,40 25,20" fill="none" stroke="url(#tg)" strokeWidth="2.8" strokeLinejoin="round"/>
  <!-- forehead stripes - gold/orange -->
  <polygon points="50,20 44,32 50,28 56,32" fill="#ffd200" opacity="0.7"/>
  <polygon points="38,24 32,34 40,30" fill="#f7971e" opacity="0.5"/>
  <polygon points="62,24 68,34 60,30" fill="#f7971e" opacity="0.5"/>
  <!-- eyes - bright cyan -->
  <polygon points="34,42 42,38 46,44 40,46" fill="#6df" opacity="0.9"/>
  <polygon points="66,42 58,38 54,44 60,46" fill="#6df" opacity="0.9"/>
  <!-- pupils -->
  <circle cx="40" cy="42" r="2.5" fill="#fff" opacity="1"/>
  <circle cx="60" cy="42" r="2.5" fill="#fff" opacity="1"/>
  <!-- eye glow -->
  <circle cx="40" cy="42" r="5" fill="#6df" opacity="0.15"/>
  <circle cx="60" cy="42" r="5" fill="#6df" opacity="0.15"/>
  <!-- nose - hot pink -->
  <polygon points="50,52 46,56 54,56" fill="#ff758c" opacity="0.8"/>
  <!-- mouth -->
  <path d="M42,60 Q46,66 50,62 Q54,66 58,60" fill="none" stroke="#ff7eb3" strokeWidth="1.5" opacity="0.6"/>
  <!-- cheek whiskers left - purple/blue mix -->
  <line x1="22" y1="48" x2="34" y2="50" stroke="#dabafa" strokeWidth="1.2" opacity="0.6"/>
  <line x1="20" y1="54" x2="34" y2="54" stroke="#a8c8ff" strokeWidth="1.2" opacity="0.6"/>
  <line x1="22" y1="60" x2="34" y2="58" stroke="#dabafa" strokeWidth="1.2" opacity="0.6"/>
  <!-- cheek whiskers right -->
  <line x1="78" y1="48" x2="66" y2="50" stroke="#dabafa" strokeWidth="1.2" opacity="0.6"/>
  <line x1="80" y1="54" x2="66" y2="54" stroke="#a8c8ff" strokeWidth="1.2" opacity="0.6"/>
  <line x1="78" y1="60" x2="66" y2="58" stroke="#dabafa" strokeWidth="1.2" opacity="0.6"/>
  <!-- cheek stripes - orange/pink -->
  <polygon points="24,44 18,46 24,48" fill="#ff758c" opacity="0.5"/>
  <polygon points="76,44 82,46 76,48" fill="#ff758c" opacity="0.5"/>
  <polygon points="22,50 16,52 22,54" fill="#f7971e" opacity="0.35"/>
  <polygon points="78,50 84,52 78,54" fill="#f7971e" opacity="0.35"/>
  <!-- chin - gradient -->
  <polygon points="50,68 46,76 50,80 54,76" fill="url(#tg3)" opacity="0.6"/>
  <!-- tribal dots -->
  <circle cx="28" cy="36" r="1.2" fill="#ffd200" opacity="0.6"/>
  <circle cx="72" cy="36" r="1.2" fill="#ffd200" opacity="0.6"/>
  <!-- extra color accents -->
  <polygon points="50,4 48,10 52,10" fill="#ff7eb3" opacity="0.4"/>
  <line x1="26" y1="28" x2="30" y2="34" stroke="#f7971e" strokeWidth="0.8" opacity="0.4"/>
  <line x1="74" y1="28" x2="70" y2="34" stroke="#f7971e" strokeWidth="0.8" opacity="0.4"/>
</svg>
